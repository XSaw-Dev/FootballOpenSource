<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER CHAT PREMIUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(88, 50, 200, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 100%, rgba(50, 200, 200, 0.03) 0%, transparent 50%);
        }
        
        .container {
            width: 100%;
            max-width: 920px;
            padding: 16px;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .chat-card {
            background: rgba(16, 16, 30, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 28px 30px 24px;
            width: 100%;
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            height: 92vh;
            max-height: 780px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        
        .chat-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6, #6d28d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            flex-shrink: 0;
            letter-spacing: 1px;
        }
        
        .chat-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        
        /* ===== GATEWAY ===== */
        #gatewaySection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 12px;
        }
        
        .gateway-icon { font-size: 3.6rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .gateway-title { font-size: 1.3rem; font-weight: 600; color: #e0e0e0; }
        .gateway-desc { color: rgba(255, 255, 255, 0.15); font-size: 0.7rem; letter-spacing: 2px; }
        
        .gateway-status {
            padding: 8px 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            min-width: 180px;
        }
        .gateway-status.valid { border-color: rgba(52, 211, 153, 0.25); color: #34d399; }
        .gateway-status.expired { border-color: rgba(251, 113, 133, 0.2); color: #fb7185; }
        
        /* ===== VERIFIKASI ===== */
        #verifySection {
            display: none;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            justify-content: center;
            max-width: 440px;
            margin: 0 auto;
            width: 100%;
        }
        
        #chatSection {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { color: rgba(255, 255, 255, 0.3); font-size: 0.7rem; font-weight: 500; letter-spacing: 1px; }
        
        .input-field {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .input-field:focus { outline: none; border-color: rgba(139, 92, 246, 0.3); background: rgba(255, 255, 255, 0.06); }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.08); }
        
        .captcha-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .captcha-box .question { font-size: 1.8rem; font-weight: 600; color: #a78bfa; }
        .captcha-box .hint { color: rgba(255, 255, 255, 0.08); font-size: 0.6rem; margin-top: 4px; letter-spacing: 2px; }
        
        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139, 92, 246, 0.2); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.06); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; border-radius: 8px; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-danger:hover { box-shadow: 0 8px 28px rgba(239, 68, 68, 0.2); }
        .btn-developer { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-developer:hover { box-shadow: 0 8px 28px rgba(245, 158, 11, 0.2); }
        .btn-clear { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-clear:hover { box-shadow: 0 8px 28px rgba(139, 92, 246, 0.2); }
        .btn-success { background: linear-gradient(135deg, #34d399, #10b981); }
        .btn-success:hover { box-shadow: 0 8px 28px rgba(52, 211, 153, 0.2); }
        
        /* ===== DEVELOPER LOGIN ===== */
        #developerLoginSection {
            display: none;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            border: 1px solid rgba(245, 158, 11, 0.12);
            border-radius: 12px;
            background: rgba(245, 158, 11, 0.02);
            margin-top: 8px;
        }
        #developerLoginSection.active { display: flex; }
        
        .developer-toggle { text-align: center; margin-top: 8px; }
        .developer-toggle button { background: none; border: none; color: rgba(255, 255, 255, 0.12); font-size: 0.65rem; cursor: pointer; text-decoration: underline; font-family: inherit; }
        .developer-toggle button:hover { color: rgba(255, 255, 255, 0.25); }
        
        /* ===== CHAT ===== */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .chat-user { color: rgba(255, 255, 255, 0.2); font-size: 0.75rem; }
        .chat-user span { color: #a78bfa; font-weight: 600; }
        .chat-user .badge-developer {
            display: inline-block;
            background: #3b82f6;
            color: white;
            font-size: 0.5rem;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 6px;
            font-weight: 600;
        }
        
        .chat-status { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .status-online { color: #34d399; font-size: 0.65rem; display: flex; align-items: center; gap: 4px; }
        .status-online .dot { width: 5px; height: 5px; border-radius: 50%; background: #34d399; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .online-count { color: rgba(255, 255, 255, 0.1); font-size: 0.65rem; }
        .chat-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        
        /* ===== MESSAGES ===== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            margin: 10px 0;
            min-height: 0;
        }
        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.01); }
        #messages::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.2); border-radius: 10px; }
        
        .message {
            padding: 8px 12px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid rgba(139, 92, 246, 0.15);
            border-radius: 6px;
            animation: fadeIn 0.25s ease-out;
        }
        .message.developer { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.04); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        
        .message .msg-user {
            font-weight: 600;
            font-size: 0.7rem;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .message .msg-user .dev-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #3b82f6;
            color: white;
            font-size: 0.45rem;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .message .msg-text { font-size: 0.85rem; color: #d0d0d0; word-break: break-word; line-height: 1.4; }
        .message .msg-time { color: rgba(255, 255, 255, 0.04); font-size: 0.45rem; float: right; margin-top: 1px; }
        
        .empty-chat { text-align: center; color: rgba(255, 255, 255, 0.03); padding: 50px 0; font-size: 0.8rem; }
        .empty-chat .icon { font-size: 2.2rem; margin-bottom: 8px; opacity: 0.1; }
        
        .typing-indicator {
            color: rgba(255, 255, 255, 0.06);
            font-size: 0.65rem;
            padding: 2px 12px;
            min-height: 20px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .typing-indicator.active { color: rgba(139, 92, 246, 0.25); }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding-top: 4px;
            flex-wrap: wrap;
        }
        .chat-input-area .input-field { flex: 1; min-width: 120px; padding: 10px 14px; font-size: 0.85rem; }
        .chat-input-area .btn { padding: 10px 22px; font-size: 0.85rem; flex-shrink: 0; }
        
        /* ===== DEVELOPER DASHBOARD ===== */
        #developerDashboard {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 12px 14px;
            background: rgba(59, 130, 246, 0.02);
            border: 1px solid rgba(59, 130, 246, 0.06);
            border-radius: 12px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        #developerDashboard.active { display: flex; }
        
        .dev-dashboard-title { color: #3b82f6; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .dev-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
        .dev-tabs .btn { padding: 4px 14px; font-size: 0.6rem; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); }
        .dev-tabs .btn.active { background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .dev-tabs .btn:hover { background: rgba(255,255,255,0.06); }
        
        .dev-tab-content { display: none; padding: 4px 0; }
        .dev-tab-content.active { display: block; }
        
        .dev-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .dev-stat { background: rgba(255, 255, 255, 0.02); padding: 8px; border-radius: 8px; text-align: center; }
        .dev-stat .value { font-size: 1.1rem; font-weight: 600; color: #a78bfa; }
        .dev-stat .label { font-size: 0.5rem; color: rgba(255, 255, 255, 0.12); margin-top: 1px; }
        .dev-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .dev-actions .btn { flex: 1; min-width: 80px; padding: 8px 12px; font-size: 0.7rem; }
        
        /* ===== IP CONTROL ===== */
        .ip-control-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .ip-control-bar .input-field { flex: 1; min-width: 120px; padding: 8px 12px; font-size: 0.75rem; }
        .ip-control-bar .btn { padding: 8px 14px; font-size: 0.65rem; }
        
        #ipListContainer {
            max-height: 180px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            padding: 6px;
        }
        #ipListContainer::-webkit-scrollbar { width: 3px; }
        #ipListContainer::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.15); border-radius: 10px; }
        
        .ip-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 6px;
            border-left: 2px solid rgba(139, 92, 246, 0.1);
            margin-bottom: 3px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .ip-item.banned { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.04); }
        .ip-item .ip-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .ip-item .ip-info .ip-addr { font-size: 0.7rem; color: #c0c0c0; }
        .ip-item .ip-info .ip-badge { font-size: 0.45rem; padding: 1px 8px; border-radius: 10px; font-weight: 600; }
        .ip-item .ip-info .ip-badge.banned { background: #ef4444; color: white; }
        .ip-item .ip-info .ip-badge.normal { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
        .ip-item .ip-info .ip-detail { color: rgba(255, 255, 255, 0.08); font-size: 0.45rem; }
        .ip-item .ip-actions { display: flex; gap: 3px; flex-wrap: wrap; }
        .ip-item .ip-actions .btn { padding: 2px 10px; font-size: 0.5rem; border-radius: 6px; }
        
        .error {
            color: #fb7185;
            text-align: center;
            padding: 8px;
            border: 1px solid rgba(251, 113, 133, 0.08);
            border-radius: 8px;
            display: none;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        
        .security-result {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.65rem;
            padding: 8px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            margin-top: 6px;
            display: none;
            line-height: 1.6;
        }
        .security-result.success { color: #34d399; border: 1px solid rgba(52, 211, 153, 0.1); }
        .security-result.error { color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.1); }
        
        @media (max-width: 600px) {
            .container { padding: 8px; }
            .chat-card { padding: 16px; height: 96vh; max-height: none; border-radius: 16px; }
            .chat-title { font-size: 1.3rem; }
            .chat-header { flex-direction: column; align-items: stretch; gap: 6px; }
            .chat-status { justify-content: space-between; }
            .chat-input-area { flex-direction: column; }
            .chat-input-area .btn { width: 100%; }
            .captcha-box .question { font-size: 1.4rem; }
            #messages { height: 280px; }
            .dev-actions .btn { min-width: 100%; }
            .ip-control-bar { flex-direction: column; }
            .ip-item { flex-direction: column; align-items: stretch; gap: 4px; }
            .ip-item .ip-actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-card">
        <div class="chat-title">⚡ CYBER CHAT</div>
        <div class="chat-subtitle">SECURE • REAL-TIME • PREMIUM</div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- ===== GATEWAY ===== -->
        <div id="gatewaySection">
            <div class="gateway-icon">🔐</div>
            <div class="gateway-title">Security Gateway</div>
            <div class="gateway-desc">✦ Verifikasi sesi untuk akses chat ✦</div>
            <div class="gateway-status" id="gatewayStatus">⏳ Memeriksa session...</div>
        </div>
        
        <!-- ===== VERIFIKASI ===== -->
        <div id="verifySection">
            <div class="input-group">
                <label>👤 Username Telegram</label>
                <input type="text" id="telegramUsername" class="input-field" placeholder="Masukkan username..." required>
            </div>
            
            <div class="input-group">
                <label>🔐 Verifikasi Captcha</label>
                <div class="captcha-box">
                    <div class="question" id="captchaQuestion">Loading...</div>
                    <div class="hint">✦ Verifikasi manusia ✦</div>
                </div>
                <input type="text" id="captchaAnswer" class="input-field" placeholder="Masukkan hasil penjumlahan..." required style="margin-top:8px;">
                <input type="hidden" id="captchaId">
                <button class="btn" onclick="verifyCaptcha()" style="margin-top:10px;" id="verifyBtn">🚀 Verifikasi</button>
            </div>
            
            <div class="developer-toggle">
                <button onclick="toggleDeveloperLogin()">🔑 Login Developer</button>
            </div>
            
            <div id="developerLoginSection">
                <div class="input-group">
                    <label>👤 Username Developer</label>
                    <input type="text" id="developerUsername" class="input-field" placeholder="Username developer...">
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" id="developerPassword" class="input-field" placeholder="Password developer...">
                </div>
                <button class="btn btn-developer" onclick="developerLogin()">🔑 Login Developer</button>
            </div>
        </div>
        
        <!-- ===== CHAT ===== -->
        <div id="chatSection">
            <div class="chat-header">
                <div>
                    <div class="chat-user">👤 <span id="currentUser">-</span><span id="devBadge" style="display:none;" class="badge-developer">⭐ DEVELOPER</span></div>
                    <div class="status-online"><span class="dot"></span> Online</div>
                </div>
                <div class="chat-status">
                    <span class="online-count" id="onlineCount">👥 0 online</span>
                    <div class="chat-actions">
                        <button class="btn btn-sm btn-secondary" onclick="toggleDeveloperDashboard()" id="devDashBtn" style="display:none;">📊 Dev</button>
                        <button class="btn btn-sm btn-danger" onclick="logout()">⛔ Keluar</button>
                    </div>
                </div>
            </div>
            
            <!-- ===== DEVELOPER DASHBOARD ===== -->
            <div id="developerDashboard">
                <div class="dev-dashboard-title">📊 Developer Dashboard</div>
                <div class="dev-tabs">
                    <button class="btn active" onclick="showDevTab('stats')" data-tab="stats">📊 Stats</button>
                    <button class="btn" onclick="showDevTab('ipcontrol')" data-tab="ipcontrol">🌐 Control IP</button>
                    <button class="btn" onclick="showDevTab('security')" data-tab="security">🛡️ Security</button>
                </div>
                
                <!-- Tab: Stats -->
                <div id="devTabStats" class="dev-tab-content active">
                    <div class="dev-stats">
                        <div class="dev-stat">
                            <div class="value" id="statUsers">0</div>
                            <div class="label">Online Users</div>
                        </div>
                        <div class="dev-stat">
                            <div class="value" id="statMessages">0</div>
                            <div class="label">Total Messages</div>
                        </div>
                        <div class="dev-stat">
                            <div class="value" id="statBlocked">0</div>
                            <div class="label">Blocked IPs</div>
                        </div>
                    </div>
                    <div class="dev-actions">
                        <button class="btn btn-clear btn-sm" onclick="clearMessages()">🗑️ Clear Messages</button>
                    </div>
                </div>
                
                <!-- Tab: Control IP -->
                <div id="devTabIpcontrol" class="dev-tab-content">
                    <div class="ip-control-bar">
                        <input type="text" id="banIpInput" class="input-field" placeholder="IP address...">
                        <button class="btn btn-danger btn-sm" onclick="banIp()">🚫 Ban</button>
                        <button class="btn btn-success btn-sm" onclick="unbanIp()">✅ Unban</button>
                        <button class="btn btn-secondary btn-sm" onclick="loadIpList()">🔄 Refresh</button>
                    </div>
                    <div id="ipListContainer">
                        <div style="color:rgba(255,255,255,0.05);text-align:center;padding:12px;font-size:0.7rem;">Loading IP list...</div>
                    </div>
                </div>
                
                <!-- Tab: Security -->
                <div id="devTabSecurity" class="dev-tab-content">
                    <div class="dev-actions">
                        <button class="btn btn-secondary btn-sm" onclick="testSecurity()">🛡️ Test Security Gateway</button>
                    </div>
                    <div id="securityTestResult" class="security-result"></div>
                </div>
            </div>
            
            <div id="messages">
                <div class="empty-chat"><div class="icon">💬</div>BELUM ADA PESAN</div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">✎ ...</div>
            
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="input-field" placeholder="Ketik pesan..." maxlength="500">
                <button class="btn" onclick="sendMessage()">➤ Kirim</button>
            </div>
        </div>
        
    </div>
</div>

<script>
    // ============================================================
    // 1. ANTI-DEVTOOLS
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
            showError('⛔ DevTools diblokir.');
            return false;
        }
    });
    document.addEventListener('contextmenu', (e) => { e.preventDefault(); showError('⛔ Right-click diblokir.'); return false; });
    
    // ============================================================
    // 2. GLOBAL VARIABLES
    // ============================================================
    let refreshInterval = null;
    let typingInterval = null;
    let lastMessageCount = 0;
    let isDeveloper = false;
    let username = '';
    let isVerifying = false;
    
    // ============================================================
    // 3. AUTO CHECK SESSION
    // ============================================================
    async function autoCheckSession() {
        const statusEl = document.getElementById('gatewayStatus');
        statusEl.textContent = '⏳ Memeriksa session...';
        statusEl.className = 'gateway-status';
        
        try {
            const res = await fetch('/api/check-session', { method: 'GET', credentials: 'include' });
            const data = await res.json();
            
            if (data.valid) {
                isDeveloper = data.isDeveloper || false;
                username = data.username;
                statusEl.textContent = '✅ Session valid';
                statusEl.className = 'gateway-status valid';
                setTimeout(() => enterChat(username), 400);
            } else {
                statusEl.textContent = '⏳ Session expired';
                statusEl.className = 'gateway-status expired';
                setTimeout(() => showVerify(), 600);
            }
        } catch (error) {
            statusEl.textContent = '❌ Error';
            statusEl.className = 'gateway-status expired';
            setTimeout(() => showVerify(), 800);
        }
    }
    
    function showVerify() {
        document.getElementById('gatewaySection').style.display = 'none';
        document.getElementById('verifySection').style.display = 'flex';
        loadCaptcha();
    }
    
    function enterChat(username) {
        document.getElementById('gatewaySection').style.display = 'none';
        document.getElementById('verifySection').style.display = 'none';
        document.getElementById('chatSection').style.display = 'flex';
        document.getElementById('currentUser').textContent = username;
        
        if (isDeveloper) {
            document.getElementById('devBadge').style.display = 'inline-block';
            document.getElementById('devDashBtn').style.display = 'inline-block';
            document.getElementById('developerDashboard').classList.add('active');
            loadDeveloperStats();
        }
        
        loadMessages();
        startAutoRefresh();
        startTypingPolling();
        updateOnlineUsers();
    }
    
    // ============================================================
    // 4. CAPTCHA
    // ============================================================
    async function loadCaptcha() {
        try {
            const res = await fetch('/api/captcha');
            const data = await res.json();
            document.getElementById('captchaQuestion').textContent = data.question;
            document.getElementById('captchaId').value = data.captchaId;
            document.getElementById('captchaAnswer').value = '';
            hideError();
        } catch {
            document.getElementById('captchaQuestion').textContent = '3 + 4 = ?';
            document.getElementById('captchaId').value = 'fallback-' + Date.now();
        }
    }
    
    async function verifyCaptcha() {
        if (isVerifying) return;
        isVerifying = true;
        
        const username = document.getElementById('telegramUsername').value.trim();
        const answer = document.getElementById('captchaAnswer').value.trim();
        const captchaId = document.getElementById('captchaId').value;
        
        if (!username || !answer) {
            showError('Username dan captcha wajib diisi!');
            isVerifying = false;
            return;
        }
        
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Verifying...';
        
        try {
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramUsername: username, answer, captchaId })
            });
            
            const data = await res.json();
            
            if (data.success) {
                isDeveloper = data.isDeveloper || false;
                enterChat(username);
            } else {
                showError(data.error || 'Verifikasi gagal!');
                loadCaptcha();
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
        
        btn.disabled = false;
        btn.textContent = '🚀 Verifikasi';
        isVerifying = false;
    }
    
    // ============================================================
    // 5. DEVELOPER LOGIN
    // ============================================================
    function toggleDeveloperLogin() {
        const section = document.getElementById('developerLoginSection');
        section.classList.toggle('active');
        if (section.classList.contains('active')) {
            document.getElementById('developerUsername').focus();
        }
    }
    
    async function developerLogin() {
        const username = document.getElementById('developerUsername').value.trim();
        const password = document.getElementById('developerPassword').value.trim();
        
        if (!username || !password) {
            showError('Username dan password wajib diisi!');
            return;
        }
        
        try {
            const res = await fetch('/api/developer-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                isDeveloper = true;
                showError('✅ Login developer berhasil!');
                setTimeout(() => location.reload(), 1000);
            } else {
                showError(data.error || 'Login gagal!');
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ============================================================
    // 6. MESSAGES
    // ============================================================
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        if (message.length > 500) {
            showError('Pesan maksimal 500 karakter!');
            return;
        }
        
        try {
            const res = await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            
            if (!res.ok) {
                const data = await res.json();
                if (res.status === 401) {
                    showError('Session expired. Login ulang.');
                    logout();
                    return;
                }
                throw new Error(data.error || 'Gagal kirim pesan');
            }
            
            input.value = '';
            document.getElementById('typingIndicator').classList.remove('active');
            loadMessages();
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    async function loadMessages() {
        try {
            const res = await fetch('/api/chat/messages');
            if (!res.ok) {
                if (res.status === 401) { logout(); return; }
                throw new Error('Gagal ambil pesan');
            }
            
            const data = await res.json();
            lastMessageCount = data.messages.length;
            renderMessages(data.messages);
            
            if (isDeveloper) {
                document.getElementById('statMessages').textContent = data.messages.length;
            }
        } catch (error) {
            console.error('Load messages error:', error);
        }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messages');
        
        if (!messages || messages.length === 0) {
            container.innerHTML = `<div class="empty-chat"><div class="icon">💬</div>BELUM ADA PESAN</div>`;
            return;
        }
        
        let html = '';
        messages.forEach(msg => {
            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const isDev = msg.isDeveloper || false;
            html += `
                <div class="message${isDev ? ' developer' : ''}">
                    <div class="msg-user">
                        ${msg.username}
                        ${isDev ? '<span class="dev-badge">⭐ DEV</span>' : ''}
                    </div>
                    <div class="msg-text">${msg.message}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    // ============================================================
    // 7. CLEAR MESSAGES (Developer Only)
    // ============================================================
    async function clearMessages() {
        if (!confirm('⚠️ Yakin mau hapus semua pesan? Tindakan ini tidak bisa dibatalkan!')) return;
        
        try {
            const res = await fetch('/api/chat/clear', {
                method: 'DELETE',
                credentials: 'include'
            });
            
            const data = await res.json();
            if (data.success) {
                showError('✅ Semua pesan berhasil dihapus!');
                loadMessages();
            } else {
                showError(data.error || 'Gagal hapus pesan');
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ============================================================
    // 8. TYPING INDICATOR
    // ============================================================
    document.getElementById('chatInput').addEventListener('input', function() {
        const indicator = document.getElementById('typingIndicator');
        const isTyping = this.value.length > 0;
        
        if (isTyping) {
            indicator.classList.add('active');
            indicator.textContent = '✎ typing...';
        } else {
            indicator.classList.remove('active');
            indicator.textContent = '✎ ...';
        }
        
        fetch('/api/typing', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isTyping }),
            credentials: 'include'
        }).catch(() => {});
    });
    
    function startTypingPolling() {
        if (typingInterval) clearInterval(typingInterval);
        typingInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/typing-users', { credentials: 'include' });
                const data = await res.json();
                if (data.success && data.typingUsers.length > 0) {
                    const typingUsers = data.typingUsers.filter(u => u !== username);
                    if (typingUsers.length > 0) {
                        document.getElementById('typingIndicator').textContent = `✎ ${typingUsers.join(', ')} lagi ngetik...`;
                        document.getElementById('typingIndicator').classList.add('active');
                    } else {
                        document.getElementById('typingIndicator').classList.remove('active');
                        document.getElementById('typingIndicator').textContent = '✎ ...';
                    }
                }
            } catch {}
        }, 3000);
    }
    
    // ============================================================
    // 9. ONLINE USERS
    // ============================================================
    async function updateOnlineUsers() {
        try {
            const res = await fetch('/api/online-users', { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                const count = data.users.length;
                document.getElementById('onlineCount').textContent = `👥 ${count} online`;
                document.getElementById('statUsers').textContent = count;
            }
        } catch {}
    }
    
    // ============================================================
    // 10. DEVELOPER DASHBOARD
    // ============================================================
    function toggleDeveloperDashboard() {
        const dashboard = document.getElementById('developerDashboard');
        dashboard.classList.toggle('active');
        if (dashboard.classList.contains('active')) {
            loadDeveloperStats();
        }
    }
    
    function showDevTab(tab) {
        document.querySelectorAll('.dev-tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.dev-tabs .btn').forEach(el => el.classList.remove('active'));
        
        const tabMap = {
            'stats': 'devTabStats',
            'ipcontrol': 'devTabIpcontrol',
            'security': 'devTabSecurity'
        };
        
        const target = document.getElementById(tabMap[tab]);
        if (target) target.classList.add('active');
        
        const btn = document.querySelector(`.dev-tabs .btn[data-tab="${tab}"]`);
        if (btn) btn.classList.add('active');
        
        if (tab === 'ipcontrol') loadIpList();
        if (tab === 'stats') loadDeveloperStats();
    }
    
    async function loadDeveloperStats() {
        try {
            const res = await fetch('/api/test-security', { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                document.getElementById('statBlocked').textContent = data.totalBanned || 0;
            }
        } catch {}
    }
    
    // ============================================================
    // 11. IP CONTROL
    // ============================================================
    async function loadIpList() {
        const container = document.getElementById('ipListContainer');
        container.innerHTML = '<div style="color:rgba(255,255,255,0.05);text-align:center;padding:12px;font-size:0.7rem;">⏳ Loading IP list...</div>';
        
        try {
            const res = await fetch('/api/ip-list', { credentials: 'include' });
            const data = await res.json();
            
            if (data.success && data.ips && data.ips.length > 0) {
                let html = '';
                data.ips.forEach(item => {
                    const isBanned = item.isBanned;
                    html += `
                        <div class="ip-item${isBanned ? ' banned' : ''}">
                            <div class="ip-info">
                                <span class="ip-addr">${item.ip}</span>
                                <span class="ip-badge ${isBanned ? 'banned' : 'normal'}">${isBanned ? 'BANNED' : 'Active'}</span>
                                <span class="ip-detail">${item.attempts || 0} attempts • ${new Date(item.lastSeen).toLocaleDateString()}</span>
                            </div>
                            <div class="ip-actions">
                                ${!isBanned ? `<button class="btn btn-danger btn-sm" onclick="banIpManual('${item.ip}')">Ban</button>` : `<button class="btn btn-success btn-sm" onclick="unbanIpManual('${item.ip}')">Unban</button>`}
                                <button class="btn btn-secondary btn-sm" onclick="deleteIpHistory('${item.ip}')" ${isBanned ? 'disabled style="opacity:0.3;"' : ''}>🗑️</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="color:rgba(255,255,255,0.05);text-align:center;padding:12px;font-size:0.7rem;">Belum ada IP yang tercatat.</div>';
            }
        } catch (error) {
            container.innerHTML = `<div style="color:#fb7185;text-align:center;padding:12px;font-size:0.7rem;">❌ Error: ${error.message}</div>`;
        }
    }
    
    async function banIp() {
        const ip = document.getElementById('banIpInput').value.trim();
        if (!ip) { showError('Masukkan IP address!'); return; }
        await banIpManual(ip);
    }
    
    async function banIpManual(ip) {
        if (!confirm(`🚫 Yakin mau ban IP ${ip}?`)) return;
        
        try {
            const res = await fetch('/api/ban-ip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip, reason: 'Diblokir oleh admin' }),
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                showError(`✅ ${data.message}`);
                loadIpList();
                loadDeveloperStats();
            } else {
                showError(data.error || 'Gagal ban IP');
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    async function unbanIp() {
        const ip = document.getElementById('banIpInput').value.trim();
        if (!ip) { showError('Masukkan IP address!'); return; }
        await unbanIpManual(ip);
    }
    
    async function unbanIpManual(ip) {
        if (!confirm(`✅ Yakin mau unban IP ${ip}?`)) return;
        
        try {
            const res = await fetch('/api/unban-ip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip }),
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                showError(`✅ ${data.message}`);
                loadIpList();
                loadDeveloperStats();
            } else {
                showError(data.error || 'Gagal unban IP');
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    async function deleteIpHistory(ip) {
        if (!confirm(`⚠️ Yakin mau hapus IP ${ip} dari history?`)) return;
        
        try {
            const res = await fetch('/api/delete-ip', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip }),
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                showError(`✅ ${data.message}`);
                loadIpList();
            } else {
                if (data.isBanned) {
                    showError('❌ IP ini masih diban! Unban dulu sebelum menghapus.');
                } else {
                    showError(data.error || 'Gagal hapus IP');
                }
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ============================================================
    // 12. SECURITY TEST
    // ============================================================
    async function testSecurity() {
        const result = document.getElementById('securityTestResult');
        result.style.display = 'block';
        result.className = 'security-result';
        result.textContent = '⏳ Menguji keamanan...';
        
        try {
            const res = await fetch('/api/test-security', { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                result.innerHTML = `
                    ✅ Security Gateway berfungsi normal!<br>
                    Session: ${data.session.username} (${data.session.isDeveloper ? 'Developer' : 'User'})<br>
                    Total IPs: ${data.totalIPs || 0} • Banned: ${data.totalBanned || 0}
                `;
                result.className = 'security-result success';
            } else {
                result.textContent = '❌ Error: ' + (data.error || 'Gagal test security');
                result.className = 'security-result error';
            }
        } catch (error) {
            result.textContent = '❌ Error: ' + error.message;
            result.className = 'security-result error';
        }
        
        setTimeout(() => {
            result.style.display = 'none';
        }, 6000);
    }
    
    // ============================================================
    // 13. LOGOUT
    // ============================================================
    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        document.cookie = 'sessionId=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        location.reload();
    }
    
    // ============================================================
    // 14. AUTO REFRESH
    // ============================================================
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            loadMessages();
            updateOnlineUsers();
        }, 3000);
    }
    
    // ============================================================
    // 15. ERROR HANDLING
    // ============================================================
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
    
    // ============================================================
    // 16. ENTER KEY
    // ============================================================
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('chatSection').style.display === 'flex') {
                sendMessage();
            } else if (document.getElementById('verifySection').style.display === 'flex') {
                verifyCaptcha();
            }
        }
    });
    
    // ============================================================
    // 17. INIT
    // ============================================================
    window.onload = function() {
        autoCheckSession();
    };
</script>
</body>
