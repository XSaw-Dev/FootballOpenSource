<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER CHAT - I7ZX EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Orbitron', monospace;
            background: #0a0a0f;
            color: #00ffcc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0, 255, 204, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 0, 128, 0.05) 0%, transparent 50%);
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }
        
        .cyber-card {
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15), inset 0 0 40px rgba(0, 255, 204, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .cyber-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5), 0 0 60px rgba(0, 255, 204, 0.2);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        
        .cyber-subtitle {
            text-align: center;
            color: #66ffdd;
            font-size: 0.8rem;
            letter-spacing: 6px;
            opacity: 0.7;
            margin-bottom: 30px;
        }
        
        #verifySection { display: block; }
        #chatSection { display: none; }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #66ffdd;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .cyber-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 255, 204, 0.05);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            color: #00ffcc;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .cyber-input:focus {
            outline: none;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            background: rgba(0, 255, 204, 0.1);
        }
        
        .cyber-input::placeholder {
            color: rgba(0, 255, 204, 0.3);
        }
        
        .captcha-box {
            background: rgba(0, 255, 204, 0.05);
            border: 2px dashed #00ffcc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
        }
        
        .captcha-box .question {
            font-size: 2rem;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        
        .cyber-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ffcc, #00cc99);
            border: none;
            border-radius: 12px;
            color: #0a0a0f;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .cyber-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.4);
        }
        
        .cyber-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            margin-bottom: 20px;
        }
        
        .chat-user {
            color: #66ffdd;
            font-size: 0.8rem;
        }
        
        .chat-user span {
            color: #00ffcc;
            font-weight: 700;
        }
        
        .chat-logout {
            background: none;
            border: 2px solid #ff0044;
            color: #ff0044;
            padding: 8px 18px;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.7rem;
        }
        
        .chat-logout:hover {
            background: #ff0044;
            color: #0a0a0f;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.3);
        }
        
        #messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 255, 204, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.1);
            margin-bottom: 15px;
        }
        
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: rgba(0, 255, 204, 0.05);
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 10px;
        }
        
        .message {
            padding: 10px 15px;
            margin-bottom: 10px;
            background: rgba(0, 255, 204, 0.05);
            border-left: 3px solid #00ffcc;
            border-radius: 6px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message .msg-user {
            color: #ff66cc;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        
        .message .msg-text {
            color: #ccffdd;
            font-size: 0.9rem;
        }
        
        .message .msg-time {
            color: rgba(0, 255, 204, 0.3);
            font-size: 0.6rem;
            float: right;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        
        .chat-input-area .cyber-input {
            flex: 1;
        }
        
        .chat-input-area .cyber-btn {
            width: auto;
            padding: 15px 30px;
            font-size: 0.8rem;
        }
        
        .empty-chat {
            text-align: center;
            color: rgba(0, 255, 204, 0.3);
            padding: 50px 0;
            font-size: 0.9rem;
        }
        
        .error {
            color: #ff0044;
            text-align: center;
            padding: 10px;
            border: 1px solid #ff0044;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .status-online {
            color: #00ffcc;
            font-size: 0.7rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="cyber-card">
        <div class="cyber-title">CYBER CHAT</div>
        <div class="cyber-subtitle">⚡ SECURE • ANONYMOUS • EPHEMERAL ⚡</div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- ===== VERIFIKASI ===== -->
        <div id="verifySection">
            <div class="input-group">
                <label>👤 Username Telegram</label>
                <input type="text" id="telegramUsername" class="cyber-input" placeholder="Masukkan username Telegrammu..." required>
            </div>
            
            <div class="input-group">
                <label>🔐 Verifikasi Captcha</label>
                <div class="captcha-box">
                    <div class="question" id="captchaQuestion">Loading...</div>
                </div>
                <input type="text" id="captchaAnswer" class="cyber-input" placeholder="Masukkan hasil penjumlahan..." required>
                <input type="hidden" id="captchaId">
                <button class="cyber-btn" onclick="verifyCaptcha()" style="margin-top:10px;">🚀 VERIFIKASI</button>
            </div>
        </div>
        
        <!-- ===== CHAT ===== -->
        <div id="chatSection">
            <div class="chat-header">
                <div>
                    <div class="chat-user">👤 <span id="currentUser">-</span></div>
                    <div class="status-online">● ONLINE</div>
                </div>
                <button class="chat-logout" onclick="logout()">⛔ KELUAR</button>
            </div>
            
            <div id="messages">
                <div class="empty-chat">💬 Belum ada pesan. Mulai chatting!</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="cyber-input" placeholder="Ketik pesan..." maxlength="500">
                <button class="cyber-btn" onclick="sendMessage()">➤ KIRIM</button>
            </div>
        </div>
        
    </div>
</div>

<script>
    let refreshInterval = null;
    
    // ===== AMBIL CAPTCHA =====
    async function loadCaptcha() {
        try {
            const res = await fetch('/api/captcha');
            const data = await res.json();
            if (data.success) {
                document.getElementById('captchaQuestion').textContent = data.question;
                document.getElementById('captchaId').value = data.captchaId;
                document.getElementById('captchaAnswer').value = '';
                hideError();
            }
        } catch (error) {
            document.getElementById('captchaQuestion').textContent = '❌ Error load captcha';
        }
    }
    
    // ===== VERIFIKASI =====
    async function verifyCaptcha() {
        const username = document.getElementById('telegramUsername').value.trim();
        const answer = document.getElementById('captchaAnswer').value.trim();
        const captchaId = document.getElementById('captchaId').value;
        
        if (!username || !answer) {
            showError('Username dan captcha wajib diisi!');
            return;
        }
        
        try {
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramUsername: username, answer, captchaId })
            });
            
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('verifySection').style.display = 'none';
                document.getElementById('chatSection').style.display = 'block';
                document.getElementById('currentUser').textContent = username;
                loadMessages();
                startAutoRefresh();
            } else {
                showError(data.error || 'Verifikasi gagal!');
                loadCaptcha();
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ===== KIRIM PESAN =====
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        
        if (!message) return;
        if (message.length > 500) {
            showError('Pesan maksimal 500 karakter!');
            return;
        }
        
        try {
            const res = await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            
            if (!res.ok) {
                const data = await res.json();
                if (res.status === 401) {
                    alert('Session expired. Verifikasi ulang.');
                    logout();
                    return;
                }
                throw new Error(data.error || 'Gagal kirim pesan');
            }
            
            input.value = '';
            loadMessages();
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ===== AMBIL PESAN =====
    async function loadMessages() {
        try {
            const res = await fetch('/api/chat/messages');
            
            if (!res.ok) {
                if (res.status === 401) {
                    logout();
                    return;
                }
                throw new Error('Gagal ambil pesan');
            }
            
            const data = await res.json();
            renderMessages(data.messages);
        } catch (error) {
            console.error('Load messages error:', error);
        }
    }
    
    // ===== RENDER PESAN =====
    function renderMessages(messages) {
        const container = document.getElementById('messages');
        
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty-chat">💬 Belum ada pesan. Mulai chatting!</div>';
            return;
        }
        
        let html = '';
        messages.forEach(msg => {
            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            html += `
                <div class="message">
                    <div class="msg-user">${msg.username}</div>
                    <div class="msg-text">${msg.message}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    // ===== LOGOUT =====
    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        document.cookie = 'sessionId=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        location.reload();
    }
    
    // ===== AUTO REFRESH =====
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadMessages, 5000);
    }
    
    // ===== ERROR HANDLING =====
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    
    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }
    
    // ===== ENTER KEY =====
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('chatSection').style.display === 'block') {
                sendMessage();
            } else {
                verifyCaptcha();
            }
        }
    });
    
    // ===== INIT =====
    loadCaptcha();
</script>
</body>
    </html>
