<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER CHAT 2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --neon-green: #00ffcc;
            --neon-pink: #ff66cc;
            --neon-blue: #4d7aff;
            --neon-yellow: #ffe066;
            --glow-green: 0 0 30px rgba(0, 255, 204, 0.15);
        }
        
        body {
            font-family: 'Orbitron', monospace;
            background: var(--bg-primary);
            color: var(--neon-green);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300ffcc' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            overflow: hidden;
        }
        
        /* ===== PARTICLE BACKGROUND ===== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .cyber-card {
            background: rgba(10, 10, 20, 0.92);
            border: 2px solid var(--neon-green);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--glow-green), inset 0 0 40px rgba(0, 255, 204, 0.03);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .cyber-card:hover {
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.2), inset 0 0 60px rgba(0, 255, 204, 0.05);
        }
        
        .cyber-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 5px;
            letter-spacing: 6px;
            position: relative;
            z-index: 1;
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }
        
        .cyber-subtitle {
            text-align: center;
            color: rgba(0, 255, 204, 0.5);
            font-size: 0.7rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* ===== GATEWAY SECTION ===== */
        #gatewaySection {
            position: relative;
            z-index: 1;
            display: block;
            text-align: center;
            padding: 30px 20px;
        }
        
        .gateway-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .gateway-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-green);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        
        .gateway-desc {
            color: rgba(0, 255, 204, 0.3);
            font-size: 0.7rem;
            letter-spacing: 4px;
            margin-bottom: 25px;
        }
        
        .gateway-status {
            display: inline-block;
            padding: 8px 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 30px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: rgba(0, 255, 204, 0.5);
            margin-bottom: 20px;
        }
        
        .gateway-status.valid {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
        }
        
        .gateway-status.expired {
            border-color: #ff0044;
            color: #ff0044;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.1);
        }
        
        /* ===== VERIFIKASI ===== */
        #verifySection {
            display: none;
            position: relative;
            z-index: 1;
        }
        
        #chatSection {
            display: none;
            position: relative;
            z-index: 1;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: rgba(0, 255, 204, 0.7);
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .input-group:focus-within label {
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        
        .cyber-input {
            width: 100%;
            padding: 16px 22px;
            background: rgba(0, 255, 204, 0.03);
            border: 2px solid rgba(0, 255, 204, 0.15);
            border-radius: 14px;
            color: var(--neon-green);
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }
        
        .cyber-input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.08);
            background: rgba(0, 255, 204, 0.06);
            transform: scale(1.01);
        }
        
        .cyber-input::placeholder {
            color: rgba(0, 255, 204, 0.15);
            font-size: 0.7rem;
        }
        
        .captcha-box {
            background: rgba(0, 255, 204, 0.03);
            border: 2px dashed rgba(0, 255, 204, 0.1);
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            margin: 15px 0;
            transition: 0.3s;
        }
        
        .captcha-box:hover {
            border-color: rgba(0, 255, 204, 0.2);
        }
        
        .captcha-box .question {
            font-size: 2.5rem;
            color: var(--neon-green);
            text-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            font-weight: 900;
            animation: pulse 2s infinite;
        }
        
        .captcha-box .hint {
            color: rgba(0, 255, 204, 0.15);
            font-size: 0.6rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        
        .cyber-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-green), #00cc99);
            border: none;
            border-radius: 14px;
            color: #0a0a0f;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }
        
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }
        
        .cyber-btn:hover::before {
            left: 100%;
        }
        
        .cyber-btn:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.25);
        }
        
        .cyber-btn:active {
            transform: scale(0.98);
        }
        
        .cyber-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* ===== CHAT ===== */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.06);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .chat-user {
            color: rgba(0, 255, 204, 0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        
        .chat-user span {
            color: var(--neon-pink);
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .status-online {
            color: var(--neon-green);
            font-size: 0.6rem;
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }
        
        .session-info {
            color: rgba(0, 255, 204, 0.15);
            font-size: 0.5rem;
            letter-spacing: 1px;
        }
        
        .chat-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .chat-logout {
            background: none;
            border: 2px solid rgba(255, 0, 68, 0.3);
            color: #ff0044;
            padding: 8px 18px;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.6rem;
            letter-spacing: 2px;
        }
        
        .chat-logout:hover {
            background: #ff0044;
            color: #0a0a0f;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.2);
            transform: scale(1.05);
        }
        
        #messages {
            height: 420px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 255, 204, 0.015);
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 204, 0.04);
            margin-bottom: 15px;
            position: relative;
        }
        
        #messages::-webkit-scrollbar {
            width: 4px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: rgba(0, 255, 204, 0.02);
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }
        
        .message {
            padding: 12px 18px;
            margin-bottom: 10px;
            background: rgba(0, 255, 204, 0.03);
            border-left: 3px solid var(--neon-green);
            border-radius: 8px;
            animation: slideIn 0.4s ease-out;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .message:hover {
            background: rgba(0, 255, 204, 0.06);
            transform: translateX(4px) scale(1.005);
            border-left-color: var(--neon-pink);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        .message .msg-user {
            color: var(--neon-pink);
            font-weight: 700;
            font-size: 0.7rem;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        
        .message .msg-text {
            color: #e0e8f0;
            font-size: 0.85rem;
            font-family: 'Segoe UI', sans-serif;
            word-break: break-word;
            line-height: 1.5;
        }
        
        .message .msg-time {
            color: rgba(0, 255, 204, 0.1);
            font-size: 0.5rem;
            float: right;
            letter-spacing: 1px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
            position: relative;
        }
        
        .chat-input-area .cyber-input {
            flex: 1;
            padding: 14px 20px;
            font-size: 0.8rem;
        }
        
        .chat-input-area .cyber-btn {
            width: auto;
            padding: 14px 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        
        .typing-indicator {
            color: rgba(0, 255, 204, 0.15);
            font-size: 0.6rem;
            padding: 5px 15px;
            letter-spacing: 2px;
            height: 20px;
            transition: 0.3s;
        }
        
        .typing-indicator.active {
            color: rgba(0, 255, 204, 0.4);
        }
        
        .empty-chat {
            text-align: center;
            color: rgba(0, 255, 204, 0.08);
            padding: 80px 0;
            font-size: 0.8rem;
            letter-spacing: 4px;
        }
        
        .empty-chat .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.2;
        }
        
        .error {
            color: #ff0044;
            text-align: center;
            padding: 12px;
            border: 1px solid rgba(255, 0, 68, 0.15);
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.7rem;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .online-count {
            color: rgba(0, 255, 204, 0.15);
            font-size: 0.6rem;
            letter-spacing: 2px;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .cyber-title {
                font-size: 1.8rem;
                letter-spacing: 3px;
            }
            
            .cyber-card {
                padding: 20px;
                border-radius: 16px;
            }
            
            #messages {
                height: 300px;
            }
            
            .chat-input-area {
                flex-direction: column;
            }
            
            .chat-input-area .cyber-btn {
                width: 100%;
            }
            
            .captcha-box .question {
                font-size: 1.8rem;
            }
            
            .gateway-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<!-- ===== PARTICLE BACKGROUND ===== -->
<canvas id="particles-canvas"></canvas>

<div class="container">
    <div class="cyber-card">
        <div class="cyber-title">CYBER CHAT</div>
        <div class="cyber-subtitle">⚡ SECURE • ANONYMOUS • EPHEMERAL ⚡</div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- ===== GATEWAY (Auto-check) ===== -->
        <div id="gatewaySection">
            <div class="gateway-icon">🔐</div>
            <div class="gateway-title">CAPTCHA GATEWAY</div>
            <div class="gateway-desc">✦ VERIFIKASI SESI UNTUK AKSES CHAT ✦</div>
            <div class="gateway-status" id="gatewayStatus">⏳ MEMERIKSA SESSION...</div>
            <div style="margin-top:15px; color: rgba(0,255,204,0.1); font-size:0.6rem; letter-spacing:1px;">
                Cookie berlaku 7 hari • Auto-check setiap refresh
            </div>
        </div>
        
        <!-- ===== VERIFIKASI (Login + Captcha) ===== -->
        <div id="verifySection">
            <div class="input-group">
                <label>👤 USERNAME TELEGRAM</label>
                <input type="text" id="telegramUsername" class="cyber-input" placeholder="Masukkan username Telegram..." required>
            </div>
            
            <div class="input-group">
                <label>🔐 VERIFIKASI CAPTCHA</label>
                <div class="captcha-box">
                    <div class="question" id="captchaQuestion">Loading...</div>
                    <div class="hint">✦ VERIFIKASI MANUSIA ✦</div>
                </div>
                <input type="text" id="captchaAnswer" class="cyber-input" placeholder="Masukkan hasil penjumlahan..." required style="margin-top:10px;">
                <input type="hidden" id="captchaId">
                <button class="cyber-btn" onclick="verifyCaptcha()" style="margin-top:15px;" id="verifyBtn">
                    🚀 VERIFIKASI
                </button>
            </div>
        </div>
        
        <!-- ===== CHAT ===== -->
        <div id="chatSection">
            <div class="chat-header">
                <div>
                    <div class="chat-user">👤 <span id="currentUser">-</span></div>
                    <div class="status-online">● ONLINE</div>
                    <div class="session-info" id="sessionInfo">Session: 7 hari</div>
                </div>
                <div class="chat-actions">
                    <span class="online-count" id="onlineCount">👥 0 online</span>
                    <button class="chat-logout" onclick="logout()">⛔ KELUAR</button>
                </div>
            </div>
            
            <div id="messages">
                <div class="empty-chat">
                    <div class="icon">💬</div>
                    BELUM ADA PESAN<br>
                    <span style="font-size:0.6rem;opacity:0.5;">MULAI CHATTING!</span>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">✎ ...</div>
            
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="cyber-input" placeholder="Ketik pesan..." maxlength="500">
                <button class="cyber-btn" onclick="sendMessage()">➤ KIRIM</button>
            </div>
        </div>
        
    </div>
</div>

<script>
    // ===== ANTI-DEVTOOLS =====
    // 1. Blokir F12, Ctrl+Shift+I, Ctrl+U, Ctrl+Shift+C
    document.addEventListener('keydown', (e) => {
        if (
            e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
            (e.ctrlKey && e.key === 'U')
        ) {
            e.preventDefault();
            showError('⛔ DevTools diblokir untuk keamanan.');
            return false;
        }
    });
    
    // 2. Blokir right-click (context menu)
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showError('⛔ Right-click diblokir.');
        return false;
    });
    
    // 3. Cek devtools via console.log (deteksi debugger)
    (function detectDevTools() {
        let startTime = Date.now();
        debugger;
        let endTime = Date.now();
        if (endTime - startTime > 100) {
            showError('⛔ DevTools terdeteksi!');
            document.body.innerHTML = `
                <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0a0a0f;color:#ff0044;font-family:monospace;flex-direction:column;gap:20px;">
                    <h1 style="font-size:3rem;">⛔</h1>
                    <p style="font-size:1.5rem;letter-spacing:4px;">DEVELOPER TOOLS DETECTED</p>
                    <p style="color:rgba(255,0,68,0.3);font-size:0.8rem;">Akses ditolak demi keamanan.</p>
                </div>
            `;
        }
    })();
    
    // ===== PARTICLE SYSTEM =====
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`;
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0, 255, 204, 0.1)';
        }
    }
    
    for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
    }
    
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();
    
    // ===== GLOBAL VARIABLES =====
    let refreshInterval = null;
    let lastMessageCount = 0;
    let sessionValid = false;
    let username = '';
    let isVerifying = false;
    
    // ===== AUTO CHECK SESSION (TANPA TOMBOL) =====
    async function autoCheckSession() {
        const statusEl = document.getElementById('gatewayStatus');
        statusEl.textContent = '⏳ MEMERIKSA SESSION...';
        statusEl.className = 'gateway-status';
        
        try {
            const res = await fetch('/api/check-session', {
                method: 'GET',
                credentials: 'include'
            });
            
            const data = await res.json();
            
            if (data.valid) {
                // Session valid! Langsung masuk chat
                sessionValid = true;
                username = data.username;
                statusEl.textContent = '✅ SESSION VALID';
                statusEl.className = 'gateway-status valid';
                setTimeout(() => enterChat(username), 500);
            } else {
                // Session expired / ga ada cookie
                statusEl.textContent = '⏳ SESSION EXPIRED';
                statusEl.className = 'gateway-status expired';
                setTimeout(() => showVerify(), 800);
            }
        } catch (error) {
            statusEl.textContent = '❌ ERROR';
            statusEl.className = 'gateway-status expired';
            setTimeout(() => showVerify(), 1000);
        }
    }
    
    // ===== SHOW VERIFIKASI =====
    function showVerify() {
        document.getElementById('gatewaySection').style.display = 'none';
        document.getElementById('verifySection').style.display = 'block';
        loadCaptcha();
    }
    
    // ===== ENTER CHAT =====
    function enterChat(username) {
        document.getElementById('gatewaySection').style.display = 'none';
        document.getElementById('verifySection').style.display = 'none';
        document.getElementById('chatSection').style.display = 'block';
        document.getElementById('currentUser').textContent = username;
        document.getElementById('sessionInfo').textContent = 'Session: 7 hari';
        loadMessages();
        startAutoRefresh();
    }
    
    // ===== AMBIL CAPTCHA =====
    async function loadCaptcha() {
        try {
            const res = await fetch('/api/captcha');
            const data = await res.json();
            if (data.success) {
                document.getElementById('captchaQuestion').textContent = data.question;
                document.getElementById('captchaId').value = data.captchaId;
                document.getElementById('captchaAnswer').value = '';
                hideError();
            }
        } catch (error) {
            document.getElementById('captchaQuestion').textContent = '3 + 4 = ?';
            document.getElementById('captchaId').value = 'fallback-' + Date.now();
        }
    }
    
    // ===== VERIFIKASI CAPTCHA =====
    async function verifyCaptcha() {
        if (isVerifying) return;
        isVerifying = true;
        
        const username = document.getElementById('telegramUsername').value.trim();
        const answer = document.getElementById('captchaAnswer').value.trim();
        const captchaId = document.getElementById('captchaId').value;
        
        if (!username || !answer) {
            showError('Username dan captcha wajib diisi!');
            isVerifying = false;
            return;
        }
        
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = '⏳ VERIFYING...';
        
        try {
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramUsername: username, answer, captchaId })
            });
            
            const data = await res.json();
            
            if (data.success) {
                sessionValid = true;
                enterChat(username);
            } else {
                showError(data.error || 'Verifikasi gagal!');
                loadCaptcha();
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
        
        btn.disabled = false;
        btn.textContent = '🚀 VERIFIKASI';
        isVerifying = false;
    }
    
    // ===== KIRIM PESAN =====
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        
        if (!message) return;
        if (message.length > 500) {
            showError('Pesan maksimal 500 karakter!');
            return;
        }
        
        try {
            const res = await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            
            if (!res.ok) {
                const data = await res.json();
                if (res.status === 401) {
                    showError('Session expired. Silahkan login ulang.');
                    logout();
                    return;
                }
                throw new Error(data.error || 'Gagal kirim pesan');
            }
            
            input.value = '';
            loadMessages();
        } catch (error) {
            showError('Error: ' + error.message);
        }
    }
    
    // ===== AMBIL PESAN =====
    async function loadMessages() {
        try {
            const res = await fetch('/api/chat/messages');
            
            if (!res.ok) {
                if (res.status === 401) {
                    logout();
                    return;
                }
                throw new Error('Gagal ambil pesan');
            }
            
            const data = await res.json();
            lastMessageCount = data.messages.length;
            renderMessages(data.messages);
        } catch (error) {
            console.error('Load messages error:', error);
        }
    }
    
    // ===== RENDER PESAN =====
    function renderMessages(messages) {
        const container = document.getElementById('messages');
        
        if (!messages || messages.length === 0) {
            container.innerHTML = `
                <div class="empty-chat">
                    <div class="icon">💬</div>
                    BELUM ADA PESAN<br>
                    <span style="font-size:0.6rem;opacity:0.5;">MULAI CHATTING!</span>
                </div>
            `;
            return;
        }
        
        let html = '';
        messages.forEach(msg => {
            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            html += `
                <div class="message">
                    <div class="msg-user">${msg.username}</div>
                    <div class="msg-text">${msg.message}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    // ===== TYPING INDICATOR =====
    document.getElementById('chatInput').addEventListener('input', function() {
        const indicator = document.getElementById('typingIndicator');
        if (this.value.length > 0) {
            indicator.classList.add('active');
            indicator.textContent = '✎ typing...';
        } else {
            indicator.classList.remove('active');
            indicator.textContent = '✎ ...';
        }
    });
    
    // ===== LOGOUT =====
    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        document.cookie = 'sessionId=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        sessionValid = false;
        location.reload();
    }
    
    // ===== AUTO REFRESH =====
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadMessages, 3000);
    }
    
    // ===== ERROR HANDLING =====
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    
    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }
    
    // ===== ENTER KEY =====
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('chatSection').style.display === 'block') {
                sendMessage();
            } else if (document.getElementById('verifySection').style.display === 'block') {
                verifyCaptcha();
            }
        }
    });
    
    // ===== INIT =====
    // Auto check session saat load
    window.onload = function() {
        autoCheckSession();
    };
</script>
</body>
